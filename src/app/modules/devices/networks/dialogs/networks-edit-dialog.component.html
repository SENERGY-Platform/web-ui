<h2 mat-dialog-title>Edit</h2>

<mat-dialog-content #content>
    <mat-form-field appearance="outline" class="full-width" color="accent">
        <mat-label>ID</mat-label>
        <input matInput disabled value="{{network.id}}">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width" color="accent">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="network.name">
    </mat-form-field>

    <div class="attributes">
        <div class="divider">
            Attributes
            <mat-divider></mat-divider>
        </div>
        <div *ngFor="let attr of network.attributes; let i = index" class="attribute">
            @if(!hiddenAttributes.includes(attr.key)) {
            <mat-form-field appearance="outline" class="third-width" color="accent">
                <mat-label>Key</mat-label>
                <mtx-select [(ngModel)]="attr.key" [ngModelOptions]="{standalone: true}"
                    [disabled]="!editableAttribute(attr)" [items]="knownAttributes" appendTo=".ng-select-anchor"
                    [addTag]="addAttribute()"></mtx-select>
                <mat-error senergyError label="Key"></mat-error>
            </mat-form-field>
            =
            <mat-form-field appearance="outline" class="third-width" color="accent">
                <mat-label>Value</mat-label>
                @switch(attr.key) {
                    @case('senergy/lora/certs-expiration') {
                        <input matInput disabled value="{{attr.value | date: 'medium'}}">
                    }
                @default {
                <input matInput [(ngModel)]="attr.value" [ngModelOptions]="{standalone: true}"
                    [disabled]="!editableAttribute(attr)">
                }
                }
                <mat-error senergyError label="Value"></mat-error>
            </mat-form-field>
            <div [matTooltip]="editableAttribute(attr) ? '' : attr.origin">
                <button mat-icon-button color="warn" (click)="removeAttr(i)" [disabled]="!editableAttribute(attr)">
                    <mat-icon *ngIf="!editableAttribute(attr)">conversion_path</mat-icon>
                    <mat-icon *ngIf="editableAttribute(attr)">delete</mat-icon>
                </button>
            </div>
            }
        </div>
        <button mat-stroked-button color="accent" (click)="addAttr()">Add Attribute</button>
    </div>
    <div class="divider">
        <div style="display: flex; justify-content: space-between;">
            <div>Geo Location</div>
            <div>© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors.</div>
        </div>
        <mat-divider></mat-divider>
    </div>
    <div #mapBody>
        <div *ngIf="mapCalcHeight() !== undefined" [style]="'height: ' + mapCalcHeight()+'px'">
            <div id="ol-map" class="full-width full-height">
                <app-map [map]="map"></app-map>
            </div>
        </div>
    </div>
</mat-dialog-content>

<mat-dialog-actions fxLayoutAlign="end center">
    <button mat-raised-button color="primary" (click)="close()">Cancel</button>
    <button mat-raised-button color="accent" (click)="save()">Save</button>
</mat-dialog-actions>
