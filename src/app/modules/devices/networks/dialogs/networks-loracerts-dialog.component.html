<h2 mat-dialog-title>LoRaWAN Certs</h2>

<mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width" color="accent">
        <mat-label>ID</mat-label>
        <input matInput disabled value="{{network.id}}">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width" color="accent">
        <mat-label>Name</mat-label>
        <input matInput disabled value="{{network.name}}">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" color="accent">
        <mat-label>Expires At</mat-label>
        <input matInput disabled value="{{certs.expires_at | date : 'medium'}}">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" color="accent">
        <mat-label>Certificate</mat-label>
        <button mat-icon-button matPrefix (click)="copyToClipboard(0, certs.certificate);"
                [matTooltip]="clipboardTooltip"
                [ngClass]="clipboardTooltipTimeout[0] !== undefined ? 'clipboard-success': 'clipboard'">
                <mat-icon>{{clipboardTooltipTimeout[0] !== undefined ? 'check' : 'content_copy'}}</mat-icon>
        </button>
        <textarea matInput disabled cdkTextareaAutosize>{{certs.certificate}}</textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" color="accent">
        <mat-label>Key</mat-label>
        <button mat-icon-button matPrefix (click)="copyToClipboard(1, certs.key);"
                [matTooltip]="clipboardTooltip"
                [ngClass]="clipboardTooltipTimeout[1] !== undefined ? 'clipboard-success': 'clipboard'">
                <mat-icon>{{clipboardTooltipTimeout[1] !== undefined ? 'check' : 'content_copy'}}</mat-icon>
        </button>
        <textarea matInput disabled cdkTextareaAutosize>{{certs.key}}</textarea>
    </mat-form-field>
   
</mat-dialog-content>

<mat-dialog-actions fxLayoutAlign="end center">
    <button mat-raised-button color="primary" (click)="close()">Close</button>
</mat-dialog-actions>
